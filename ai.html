<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Snake</title>
  <style>
    body {
      margin: 0;
      min-height: 100vh;
      display: grid;
      place-items: center;
      background: #0f172a;
      color: #e5e7eb;
      font-family: system-ui, -apple-system, Segoe UI, Roboto, sans-serif;
    }
    .wrap {
      background: #020617;
      border-radius: 16px;
      box-shadow: 0 20px 40px rgba(0,0,0,.5);
      padding: 16px 16px 12px;
    }
    h1 { font-size: 18px; margin: 0 0 8px; text-align: center; }
    .hud {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 8px;
      margin-bottom: 8px;
      font-size: 14px;
    }
    button {
      appearance: none;
      border: 0;
      border-radius: 10px;
      padding: 6px 10px;
      background: #22c55e;
      color: #052e16;
      font-weight: 700;
      cursor: pointer;
    }
    button:hover { filter: brightness(1.05); }
    canvas {
      display: block;
      background: #020617;
      border-radius: 12px;
      border: 1px solid #1f2937;
    }
    .hint { margin-top: 6px; font-size: 12px; color: #9ca3af; text-align: center; }
  </style>
</head>
<body>
  <div class="wrap">
    <h1>🐍 Snake</h1>
    <div class="hud">
      <div>Score: <strong id="score">0</strong></div>
      <button id="restart">Restart</button>
    </div>
    <canvas id="game" width="400" height="400" aria-label="Snake game"></canvas>
    <div class="hint">Use arrow keys or WASD</div>
  </div>

  <script>
    // ====== Game Constants ======
    const canvas = document.getElementById('game');
    const ctx = canvas.getContext('2d');
    const scoreEl = document.getElementById('score');
    const restartBtn = document.getElementById('restart');

    const GRID = 20;              // size of a cell
    const COLS = canvas.width / GRID;
    const ROWS = canvas.height / GRID;
    const SPEED_START = 110;      // ms per tick
    const SPEED_MIN = 60;

    // ====== Game State ======
    let snake, dir, nextDir, food, score, tick, speed, alive;

    function reset() {
      snake = [{ x: 10, y: 10 }];
      dir = { x: 1, y: 0 };
      nextDir = dir;
      placeFood();
      score = 0;
      speed = SPEED_START;
      alive = true;
      scoreEl.textContent = score;
      clearInterval(tick);
      tick = setInterval(loop, speed);
    }

    function placeFood() {
      while (true) {
        food = {
          x: Math.floor(Math.random() * COLS),
          y: Math.floor(Math.random() * ROWS)
        };
        if (!snake?.some(s => s.x === food.x && s.y === food.y)) break;
      }
    }

    // ====== Controls ======
    const keyMap = {
      ArrowUp:    { x: 0,  y: -1 },
      ArrowDown:  { x: 0,  y: 1  },
      ArrowLeft:  { x: -1, y: 0  },
      ArrowRight: { x: 1,  y: 0  },
      w: { x: 0,  y: -1 }, s: { x: 0,  y: 1 }, a: { x: -1, y: 0 }, d: { x: 1, y: 0 }
    };

    addEventListener('keydown', e => {
      const nd = keyMap[e.key];
      if (!nd) return;
      // prevent reversing directly
      if (nd.x + dir.x === 0 && nd.y + dir.y === 0) return;
      nextDir = nd;
    });

    restartBtn.onclick = reset;

    // ====== Loop ======
    function loop() {
      if (!alive) return;
      dir = nextDir;
      const head = { x: snake[0].x + dir.x, y: snake[0].y + dir.y };

      // wall collision
      if (head.x < 0 || head.y < 0 || head.x >= COLS || head.y >= ROWS) return gameOver();
      // self collision
      if (snake.some(s => s.x === head.x && s.y === head.y)) return gameOver();

      snake.unshift(head);

      if (head.x === food.x && head.y === food.y) {
        score++;
        scoreEl.textContent = score;
        placeFood();
        speed = Math.max(SPEED_MIN, speed - 3);
        clearInterval(tick);
        tick = setInterval(loop, speed);
      } else {
        snake.pop();
      }
      draw();
    }

    function gameOver() {
      alive = false;
      draw();
      ctx.fillStyle = 'rgba(2,6,23,.7)';
      ctx.fillRect(0, 0, canvas.width, canvas.height);
      ctx.fillStyle = '#fca5a5';
      ctx.font = 'bold 24px system-ui';
      ctx.textAlign = 'center';
      ctx.fillText('Game Over', canvas.width/2, canvas.height/2 - 8);
      ctx.font = '14px system-ui';
      ctx.fillText('Press Restart', canvas.width/2, canvas.height/2 + 18);
    }

    // ====== Render ======
    function draw() {
      ctx.clearRect(0, 0, canvas.width, canvas.height);

      // food
      ctx.fillStyle = '#fb7185';
      ctx.fillRect(food.x * GRID + 2, food.y * GRID + 2, GRID - 4, GRID - 4);

      // snake
      snake.forEach((s, i) => {
        ctx.fillStyle = i === 0 ? '#22c55e' : '#16a34a';
        ctx.fillRect(s.x * GRID + 1, s.y * GRID + 1, GRID - 2, GRID - 2);
      });
    }

    // Start
    reset();
  </script>
</body>
</html>
